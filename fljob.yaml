job_name: "pump-sensor-fl"
num_nodes: 3

data:
  dataset: "pump_sensor"
  data_dir: "./data/pump-sensor-data"
  sequence_length: 30
  train_split: 0.8
  seed: 42

training:
  rounds: 10
  local_epochs: 3
  batch_size: 32
  lr: 0.0001  # 🔴 0.001 → 0.0001로 줄임 (NaN 방지)
  weight_decay: 0.0001
  device: "cpu"
  seed: 42
  log_every: 1
  
  train_split: 0.8
  sequence_length: 30
  
  hidden_size: 64
  num_classes: 3